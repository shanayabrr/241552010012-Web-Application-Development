<!DOCTYPE html>
<html>
<head>
    <title>Descendant Selector</title>
    <style>
        /* DESCENDANT (spasi): level MANAPUN di dalam */
        div p {
            color: blue;
        }
    </style>
</head>
<body>
    <div>
        <p>Biru! </p>
        <section>
            <p>Biru Juga! </p>
        </section>
    </div>
    <p>TIDAK biru (di luar div)</p>
    
</body>
