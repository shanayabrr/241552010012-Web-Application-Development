<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Board - Proyek 1: Aula Statistik</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-box">
        <header class="game-header">
            <h1>🎲 AULA STATISTIK ALIANSI</h1>
            <button id="theme-toggle" class="game-btn">SIANG ☀️</button>
        </header>

        <p class="game-desc">Proyek 1: Sistem Zona Waktu (localStorage) & Animasi Papan Skor Real-time.</p>

        <div class="counter-grid">
            <div class="counter-card card-pink">
                <span class="card-emoji">🍓</span>
                <h3>Hero Terdaftar</h3>
                <div class="counter" data-target="100">0</div>
            </div>
            <div class="counter-card card-mint">
                <span class="card-emoji">🍦</span>
                <h3>Piala Liga</h3>
                <div class="counter" data-target="50">0</div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
