<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Board - Proyek 3: Registrasi Hero</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="form-wrapper">
        <header class="game-header">
            <h1>📝 GERBANG REGISTRASI HERO</h1>
            <button id="theme-toggle" class="game-btn">SIANG ☀️</button>
        </header>
        <p class="game-desc">Proyek 3: Validasi Real-time 3 Field & Bar Indikator Kekuatan Mantra.</p>

        <main class="game-card" id="form-card">
            <form id="hero-form" novalidate>
                <div class="form-group">
                    <label>Nama Hero (Username)</label>
                    <input type="text" id="username" placeholder="Minimal 3 karakter">
                    <span class="error" id="username-error"></span>
                </div>

                <div class="form-group">
                    <label>Surat Sihir (Email)</label>
                    <input type="email" id="email" placeholder="hero@kerajaan.com">
                    <span class="error" id="email-error"></span>
                </div>

                <div class="form-group">
                    <label>Mantra Sandi (Password)</label>
                    <input type="password" id="password" placeholder="Minimal 6 karakter">
                    <div class="strength-container"><div id="strength-bar"></div></div>
                    <span id="strength-text" style="font-size: 0.75rem; font-weight: bold; margin-top: 4px; display: block;">Kekuatan: Belum diisi</span>
                    <span class="error" id="password-error"></span>
                </div>

                <button type="submit" class="submit-game-btn">MULAI PETUALANGAN ⚔️</button>
            </form>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
