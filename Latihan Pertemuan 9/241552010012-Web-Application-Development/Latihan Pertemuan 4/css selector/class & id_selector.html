<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class(.) and Id(#)</title>
    <style>
        .highlight {
            background-color: yellow;
            padding: 5px;
        }
        .error { 
            color: red; 
        }
        #header {
            background-color: navy;
            color: white;
            padding: 20px;
        }
        #footer { 
            font-size: 12px; 
        }
        
    </style>
</head>
<body>
    <p class="highlight">Yellow bg</p>
    <p>No style (no class)</p>
    <p class="error">Red text</p>
    <p class="highlight error">Both!</p>
    <div id="header">
        Header
    </div>
    <p>Content here</p>
    <div id="footer">
        Footer
    </div>
